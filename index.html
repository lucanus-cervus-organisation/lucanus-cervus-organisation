<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>log</title>

<style>
    body {
        background: #0a0a0a;
        color: #e5e5e5;
        font-family: monospace;
        max-width: 700px;
        margin: 60px auto;
        line-height: 1.6;
    }

    h1 {
        font-size: 18px;
        color: #888;
        margin-bottom: 40px;
        font-weight: normal;
    }

    .entry {
        margin-bottom: 60px;
    }

    .date {
        color: #555;
        font-size: 12px;
        margin-bottom: 10px;
    }

    img {
        width: 100%;
        margin: 10px 0;
        filter: grayscale(100%);
    }

    p {
        margin: 10px 0;
    }

    hr {
        border: none;
        border-top: 1px solid #222;
        margin: 40px 0;
    }
</style>

</head>
<body>

<h1>// system log</h1>

<div class="entry">
    <div class="date">2026-05-06</div>
    <p>Testeintrag. Erste Inhalte geladen.</p>
    <img src="https://picsum.photos/800/400">
    <p>Random Bild als Platzhalter.</p>
</div>

<hr>

<div class="entry">
    <div class="date">2026-05-05</div>
    <p>Zweiter Eintrag. Minimalismus funktioniert.</p>
    <img src="https://picsum.photos/800/401">
</div>

</body>
</html>
